<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Offcanvas Simple</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

  <button class="btn btn-primary"
          data-bs-toggle="offcanvas"
          data-bs-target="#panelSimple">
    Abrir panel
  </button>

  <div class="offcanvas offcanvas-start"
       tabindex="-1"
       id="panelSimple"
       aria-labelledby="panelSimpleLabel">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title" id="panelSimpleLabel">Mi panel</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
      <p>Hola! Soy un panel Offcanvas.</p>
      <p>Puedes poner cualquier contenido aquí.</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
