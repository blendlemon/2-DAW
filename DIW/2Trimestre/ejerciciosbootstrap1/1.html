<!doctype html>
<html lang="en">
    <head>
        <title>Title</title>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, shrink-to-fit=no"
        />

        <!-- Bootstrap CSS v5.2.1 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
            crossorigin="anonymous"
        />
    </head>

    <body>
        <!-- Header azul -->
        <div class="bg-primary text-white p-4 mb-3">
            <h1>Header</h1>
        </div>

        <!-- Contenedor principal con dos columnas -->
        <div class="container-fluid">
            <div class="row g-3">
                <!-- Columna izquierda roja -->
                <div class="col-md-6">
                    <div class="bg-danger p-5" style="min-height: 300px;">
                        <p class="text-white">1</p>
                    </div>
                </div>

                <!-- Columna derecha con dos filas -->
                <div class="col-md-6">
                    <div class="row g-3">
                        <!-- Verde arriba -->
                        <div class="col-12">
                            <div class="bg-success p-5">
                                <p class="text-white">3</p>
                            </div>
                        </div>

                        <!-- Amarillo abajo -->
                        <div class="col-12">
                            <div class="bg-warning p-5">
                                <p>4</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bootstrap JS v5.3.2 -->
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-C6RzsynM9u+qxij1mpqvstc5CypF4rIAPstqkFLOR6DsemQQIst76QOcFZSmIY+8"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
