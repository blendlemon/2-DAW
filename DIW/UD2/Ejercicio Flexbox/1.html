<html lang="es">
<head>

    <title>Document</title>
    <style>
        body{
            display: flex;
            width: 100%;
            height: 100%;
            flex-direction: row;
            gap: 10px;
        }

            background-color: lightblue;
            display: flex;

        .item{
            font-size: larger;
            border-bottom: 1px solid black;
            padding: 10px;
        }
        
        .contenido{
            background-color: lightgrey;
            font-size: larger;
            width: 60%;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="menu">
        <div class="item">Home</div>
        <div class="item">Servicios</div>
        <div class="item">Opciones</div>
        <div class="item">Planes</div>
        <div class="item">Contacto</div>

    </div>
    <div class="contenido"><p>Este sería el contenido principal</p></div>

</body>
</html>
