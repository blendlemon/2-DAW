<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
        }

        .superior {
            width: 100%;
            display: flex;
            background-color: blue;
            height: 30%;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 10px;
        }

        .cuadrosuperior {
            width: 20%;
            height: 15%;
            background-color: yellow;
        }

        .inferior {
            margin-top: 5px;
            background-color: lightblue;
            width: 100%;
            height: 70%;
            justify-content: center;
            padding: 10px;
            gap: 10%;
            display: flex;
        }
        .izquierda{
        background-color: yellow;
        width: 40%;
        height: 100%;
        }
        .centro{
        background-color: yellow;
        width: 20%;
        height: 20%;
        align-self: center;
        }
        .derecha{
        background-color: yellow;
        width: 20%;
        height: 100%;
        }
    </style>
</head>

<body>
    <div class="superior">
        <div class="cuadrosuperior"></div>
        <div class="cuadrosuperior"></div>
        <div class="cuadrosuperior"></div>
    </div>
    <div class="inferior">
        <div class="izquierda"></div>
        <div class="centro"></div>
        <div class="derecha"></div>
    </div>
</body>

</html>
