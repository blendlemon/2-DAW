<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estructura con posicionamiento</title>
  <style>
    header{
      border: 1px solid black;
      padding: 10px;
      background-color: aquamarine;
    }
    
    .logo{
      display: inline-block;
      border: 1px solid black;
      padding: 5px;
      width: 25%;
      background-color: lightcoral;
    }

    .header-extra{
      display: inline-block;
      border: 1px solid black;
      padding: 5px;
      width: 70%;
      background-color: lightblue;

    }

    main{
      border-top: 1px solid black;
      border-bottom: 1px solid black;
      padding-top: 20px;
      margin-top: 20px;
      padding-bottom: 50px;
    }

    @media (max-width: 600px) {
      .col-izq,
      .col-centro,
      .col-der {
        display: block;
        width: 100%;
        height: auto;
        margin-bottom: 10px;
      }
    }

    .col-izq{
      display: inline-block;
      border: 1px solid black;
      width: 25%;
      height: 200px;
      background-color: lightyellow;
    }
    .col-centro{
      display: inline-block;
      border: 1px solid black;
      width: 30%;
      height: 200px;
      background-color: lightgray;
    }
    .col-der{
      display: inline-block;
      border: 1px solid black;
      width: 40%;
      height: 200px;
    }

    .col-izq, .col-centro, .col-der{
      vertical-align: top;
    }

    .caja-relativa{
      display: inline-block;
      border: 1px dotted darkgreen;
      background-color: lightgreen;
      position: relative;
      width: 150%;
      height: 20%;
      top: 70px;
      left: 20px;
    }

    .caja-absoluta{
      border: 1px solid black;
      position: absolute;
      top: -50px;
      left: 95%;
      padding: 20px;
      background-color: orange;
    }

    .caja-fija{
      position:absolute;
      border: 1px solid black;
      top: 20px;
      right: 20px;
      max-width: 200px;
      height: 100px;
      width: 100px;
      background-color: red;
    }

    footer{
      margin-top: 10px;
      border: 1px solid black;
      border-top: 2px solid black;
      text-align: center;
      background-color: lightgray;
      padding: 10px;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">Logo</div>
    <div class="header-extra">Zona cabecera extra</div>
  </header>

  <main>
  <div class="col-izq">Columna izquierda</div>

  <div class="col-centro">
    Columna central
    <div class="caja-relativa">
      Caja relativa
      <div class="caja-absoluta">Absoluta</div>
    </div>
  </div>

  <div class="col-der">Columna derecha
  
  </div>

  <!-- Caja fija fuera de las columnas -->
  <div class="caja-fija">Fija</div>
</main>

  <footer>
    Pie de página
  </footer>
</body>
</html>
