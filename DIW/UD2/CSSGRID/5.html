<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .grid-container{
            display: grid;
            border: 1px solid black;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(5, 120px);
        }

        .top{
            border: 1px solid black;
            grid-column: span 6;
            grid-row: 1 / span 1;
        }

        .left{
            border: 1px solid black;
            grid-row: 2 / span 3;
            grid-column: 1 / span 1;
        }

        .right{
            border: 1px solid black;
            grid-row: 2 / span 3;
            grid-column: 6 / span 1;
        }
        
        .relleno{
            border: 1px solid black;
            grid-row: span 1;
            grid-column: span 1;
            margin: 10px;
        }

        .bottom{
            border: 1px solid black;
            grid-row: 5 / span 1;
            grid-column: span 6;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-template-rows: repeat(1, 60px);
            align-content: center;
            padding: 20px;
            gap: 2%;
        }
        .primero{
            border: 1px solid black;
            grid-row: span 1;
            grid-column: span 1;
        }

        .segundo{
            border: 1px solid black;
            grid-row: span 1;
            grid-column: span 4;
        }

        .tercero{
            border: 1px solid black;
            grid-row: span 1;
            grid-column: span 2;
        }
    </style>

</head>
<body>
    <div class="grid-container">
        <div class="top"></div>
        <div class="left"></div>
        <div class="right"></div>
        <div class="bottom">
        <!-- meter aqui lo restante -->
         <div class="primero"></div>
         <div class="segundo"></div>
         <div class="tercero"></div>
        </div>
        <div class="relleno"></div>
        <div class="relleno"></div>
        <div class="relleno"></div>
        <div class="relleno"></div>
        <div class="relleno"></div>
        <div class="relleno"></div>
        <div class="relleno"></div>
        <div class="relleno"></div>
        <div class="relleno"></div>
        <div class="relleno"></div>
        <div class="relleno"></div>
        <div class="relleno"></div>
    </div>
</body>
</html>
