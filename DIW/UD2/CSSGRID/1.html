<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .grid-container{
            display: grid;
            background-color: blue;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(3, 120px);
            border: 1px solid black;
            gap:10px;
            padding: 5px;
        }
        .grid-container > .item{
            display: contents;
        }

        .grid-container>.item>div{
            border-radius: 1%;
            border: 1px solid black;
        }

        .grid-container>.item>div:nth-child(1){
            grid-column: 1 / span 2;
            grid-row: 1 / span 2;
            background-color: green;
        }

        .grid-container>.item>div:nth-child(2){
            grid-column: 3 / span 3;
            grid-row: 1 / span 1;
            background-color: lightblue;
        }
        .grid-container>.item>div:nth-child(3){
            grid-column: 1 / span 2;
            grid-row: 3 / span 1;
            background-color: lightcoral;
        }
        .grid-container>.item>div:nth-child(4){
            grid-column: 3 / span 2;
            grid-row: 2 / span 2;
            background-color: grey;
        }
        .grid-container>.item>div:nth-child(5){
            background-color: yellow;
        }
        .grid-container>.item>div:nth-child(6){
            background-color: lightpink;
        }
    </style>
</head>
<body>
    <div class="grid-container">
        <div class="item">
            <div>1</div>
            <div>2</div>
            <div>3</div>
            <div>4</div>
            <div>5</div>
            <div>6</div>
        </div>
    </div>
</body>
</html>
