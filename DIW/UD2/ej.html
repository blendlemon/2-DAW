<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script src="jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <style>
        * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Catamaran", sans-serif;
}

nav {
  position: fixed;
  height: 150px;
  top: 30px;
  left: 30px;
  border-radius: 8px;
  z-index: 20;
  transition: 0.4s cubic-bezier(0.77, 0, 0.175, 1);
}
nav .reference {
  position: absolute;
  top: 5px;
  left: 0;
  height: 50px;
  width: 30px;
  background: #fff;
  opacity: 0.3;
  pointer-events: none;
  z-index: 50;
  transition: opacity 0.4s cubic-bezier(0.77, 0, 0.175, 1);
  border-radius: 8px;
}
nav > ol {
  position: fixed;
  left: 52px;
}
nav > ol > li {
  width: 0;
  height: 30px;
  padding: 0;
  overflow: hidden;
  transition: 0.4s cubic-bezier(0.77, 0, 0.175, 1);
  box-shadow: 8px 0 15px 0 rgba(0, 0, 0, 0.2);
  z-index: 50;
  border-radius: 0 8px 8px 0;
  cursor: pointer;
}
nav > ol > li a {
  font-weight: 800;
  text-decoration: none;
  color: #fff;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 2pt;
  margin-left: 20px;
}
nav > ol > li .sub-menu {
  position: absolute;
  z-index: -1;
  list-style-type: none;
  text-align: left;
  height: 0;
  overflow: hidden;
  transition: 0.4s cubic-bezier(0.77, 0, 0.175, 1);
  transform: translateY(3px);
  width: 192px;
  margin-left: 8px;
  box-shadow: 2px 5px 50px 0 rgba(0, 0, 0, 0.5);
  border-radius: 0 0 8px 8px;
}
nav > ol > li .sub-menu li a {
  font-weight: 500;
  margin-left: 13px;
  transition: 0.4s cubic-bezier(0.77, 0, 0.175, 1);
}
nav > ol > li .sub-menu li:hover a {
  margin-left: 16px;
  transition: 0.4s cubic-bezier(0.77, 0, 0.175, 1);
}
nav > ol > li:before {
  content: "";
  position: fixed;
  left: 30px;
  width: 30px;
  height: 30px;
  visibility: visible;
  cursor: pointer;
  box-shadow: -7px 0 15px 0 rgba(0, 0, 0, 0.2);
  transition: 0.4s cubic-bezier(0.77, 0, 0.175, 1);
}
nav > ol > li:nth-child(1) {
  background: #537895;
}
nav > ol > li:nth-child(1):before {
  background: #537895;
  border-radius: 8px 8px 0 0;
}
nav > ol > li:nth-child(2) {
  background: #b33939;
}
nav > ol > li:nth-child(2):before {
  background: #b33939;
}
nav > ol > li:nth-child(3) {
  background: #cd6133;
  transition-delay: 0.4s;
}
nav > ol > li:nth-child(3):before {
  background: #cd6133;
}
nav > ol > li:nth-child(3) ol li:nth-child(1) {
  background: #b9572d;
}
nav > ol > li:nth-child(3) ol li:nth-child(2) {
  background: #a54d28;
}
nav > ol > li:nth-child(3) ol li:nth-child(3) {
  background: #904423;
}
nav > ol > li:nth-child(4) {
  background: #cc8e35;
  transition-delay: 0.4s;
}
nav > ol > li:nth-child(4):before {
  background: #cc8e35;
}
nav > ol > li:nth-child(4) ol li:nth-child(1) {
  background: #b9802f;
}
nav > ol > li:nth-child(4) ol li:nth-child(2) {
  background: #a4722a;
}
nav > ol > li:nth-child(4) ol li:nth-child(3) {
  background: #906424;
}
nav > ol > li:nth-child(5) {
  background: #218c74;
}
nav > ol > li:nth-child(5):before {
  background: #218c74;
  border-radius: 0 0 8px 8px;
}
nav > ol > li:hover {
  width: 200px;
  transition: 0.4s cubic-bezier(0.77, 0, 0.175, 1);
}
nav > ol > li:hover:nth-child(1):before {
  border-radius: 8px 0 0 0;
}
nav > ol > li:hover:nth-child(3) {
  border-radius: 0 8px 0 0;
}
nav > ol > li:hover:nth-child(4) {
  border-radius: 0 8px 0 0;
}
nav > ol > li:hover:nth-child(5):before {
  border-radius: 0 0 0 8px;
}
nav > ol > li:hover .sub-menu {
  height: 81px;
  transition: 0.4s cubic-bezier(0.77, 0, 0.175, 1);
  transition-delay: 0.4s;
}
nav:hover {
  width: 230px;
  transition: 0.4s cubic-bezier(0.77, 0, 0.175, 1);
}
nav:hover .reference {
  opacity: 0;
  transition: 0.4s cubic-bezier(0.77, 0, 0.175, 1);
}

content {
  color: rgba(255, 255, 255, 0.9);
  text-align: center;
}
content div {
  height: 500px;
  width: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
content div > div {
  height: 100px;
  padding: 20px 10%;
}
content h1 {
  font-size: 1.2em;
  text-transform: uppercase;
  font-weight: 800;
  letter-spacing: 4pt;
  margin: 100px 0;
}
content h2 {
  font-size: 1.2em;
  text-transform: uppercase;
  font-weight: 500;
  letter-spacing: 4pt;
}
content #home {
  background: #537895;
}
content #about {
  background: #b33939;
}
content #widgets {
  background: #cd6133;
}
content #widgets #bigwidgets {
  background: #b9572d;
}
content #widgets #biggerwidgets {
  background: #a54d28;
}
content #widgets #hugewidgets {
  background: #904423;
}
content #kabobs {
  background: #cc8e35;
}
content #kabobs #shishkabobs {
  background: #b9802f;
}
content #kabobs #bbqkabobs {
  background: #a4722a;
}
content #kabobs #summerkabobs {
  background: #906424;
}
content #contact {
  background: #218c74;
}
    </style>
</head>
<body>
    
    <nav>
        <div class="reference"></div>
  
        <ol>
            <li class="menu-item"><a href="#home">Home</a></li>

            <li class="menu-item"><a href="#about">About</a></li>

            <li class="menu-item">
                <a href="#widgets">Widgets</a>
                <ol class="sub-menu">
                <li class="menu-item"><a href="#bigwidgets">Big Widgets</a></li>
                <li class="menu-item"><a href="#biggerwidgets">Bigger Widgets</a></li>
                <li class="menu-item"><a href="#hugewidgets">Huge Widgets</a></li>
                </ol>
            </li>

            <li class="menu-item">
                <a href="#kabobs">Kabobs</a>
                <ol class="sub-menu">
                <li class="menu-item"><a href="#shishkabobs">Shishkabobs</a></li>
                <li class="menu-item"><a href="#bbqkabobs">BBQ kabobs</a></li>
                <li class="menu-item"><a href="#summerkabobs">Summer kabobs</a></li>
                </ol>
            </li>

            <li class="menu-item"><a href="#contact">Contact</a></li>
        </ol>
    </nav>

    <content>

    <div id="home">
        <h1>Home</h1>
    </div>

    <div id="about">
        <h1>About</h1>
    </div>

    <div id="widgets">
        <h1>Widgets</h1>
        
        <div id="bigwidgets"><h2>Big Widgets</h2></div>
        <div id="biggerwidgets"><h2>Bigger Widgets</h2></div>
        <div id="hugewidgets"><h2>Huge Widgets</h2></div>
    </div>
    
    <div id="kabobs">
        <h1>Kabobs</h1>
        
        <div id="shishkabobs"><h2>Shishkabobs</h2></div>
        <div id="bbqkabobs"><h2>BBQ kabobs</h2></div>
        <div id="summerkabobs"><h2>Summer kabobs</h2></div>
    </div>
        
    <div id="contact"><h1>Contact</h1></div>
    
    </content>

    <script>
        function viewport(){
        var st = $(window).scrollTop();
        var wh = $(window).height();

        var dif = $("nav").height() / $(document).height();

        $(".reference").css({
        'height': (wh * dif),
        'top': (st * dif)
        });
        }

        viewport();

        $(window).resize(function(){
        viewport();
        });

        $(window).scroll(function(){
        viewport();
        });

        $(document).on('click', 'a[href^="#"]', function (event) {
        event.preventDefault();

        $('html, body').animate({
            scrollTop: $($.attr(this, 'href')).offset().top
        }, 500);
        });
    </script>
    

</body>
</html>
