    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js"></script>

  <body>
    <div class="box">
      <div class="links">
        <table class="table">
          <tbody>
            <tr>
              <td>
                <div

            </tr>
            <tr>
              <td>

            </tr>
            <tr>
              <td>

            </tr>
            <tr>
              <td>
                <div

                </div>
              </td>
            </tr>
            <tr>
              <td>
                <div
                  class="dot"
                  onclick="currentSlide(5);playAudio('images/sonido.mp3');"

                  Expansión
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="main">
        <div class="slideshow-container">
          <div class="mySlides">
            <div class="picture">
              <iframe
                src="https://elpais.com"

            </div>
          </div>
          <div class="mySlides">

            <div class="picture">

            </div>
          </div>
          <div class="mySlides">
            <div class="picture">
              <iframe
                src="https://marca.com"
                style="width: 100%; height: 100%; border: 0"
              ></iframe>
            </div>
          </div>

          <div class="mySlides">
