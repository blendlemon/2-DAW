<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Centered viewport -->
<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css"
>
</head>
<body>
    <form action="" id="formulario">
        <label for="matricula">
            Matrícula:
        </label>
        <input type="text" name="matricula" id="matricula" placeholder="9999-XXX  o XX-9999-XX">
        <label for="expediente">
            Número Expediente:
        </label>
        <input type="text" name="expediente" id="expediente" placeholder="X99-999999-X">
        <label for="cuentaBancaria">
            Cuenta Bancaria:
        </label>
        <input type="text" name="cuentaBancaria" id="cuentaBancaria" placeholder="9999-9999-9-99-99999999">
        <label for="seguro">
            Seguro:
        </label>
        <input type="text" name="seguro" id="seguro" placeholder="99999-XX-XX-9-999">
        <button type="submit">Enviar</button>

    </form>
    <script src="script.js"></script>
</body>
</html>
