<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function resultado(){
            var aleatorio = Math.floor(Math.random()*(100)+1);
            var resultado = "";
            if (aleatorio<=50){
                resultado = "1";
            }else if (aleatorio<=90){
                resultado = "X";
            }else{
                resultado ="2";
            }
            return resultado;
        }

        for (i=0;i<15;i++){
            document.write("Partido "+(i+1)+": "+resultado()+"<br>")
        }
    </script>
</body>
</html>
