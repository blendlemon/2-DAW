<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var texto = prompt("Intoduce texto: ");
        var aux = "";
        var contador = 0;
        

        for(i = texto.length-1; i>=0 ; i--){

            if (texto.charAt(i)!=" " && texto.charAt(i)!="," && texto.charAt(i)!="."){
                aux += texto.charAt(i) ;
            }
        }
        texto = "";
        for (i = aux.length-1; i>=0; i--){
            texto += aux.charAt(i);
        }

        if (aux.toLowerCase() == texto.toLowerCase()){
            document.write("Es palindromo");
        }else{
            document.write("No es palindormo");
        }

    </script>
</body>
</html>
