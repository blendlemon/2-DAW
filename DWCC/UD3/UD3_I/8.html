<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var numeros = [];
        var aleatorio = 0;

        for (i=0; i<=2; i++){
            if (i>0){
                while (true){
                aleatorio = Math.floor(Math.random()*(49)+1);
                for (j=0;j<numeros.length;j++){
                    if (aleatorio==numeros[j]){
                        aleatorio = 0;
                    }
                }
                if (aleatorio!=0) break;
                }
            }
            else{
                aleatorio = Math.floor(Math.random()*(49)+1);
            }

            numeros[i]=aleatorio;
        }

        document.write(numeros)
    </script>
</body>
</html>
