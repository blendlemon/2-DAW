<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>
        var dias = ["domingo","lunes","martes","miercoles","jueves","viernes","sabado"];
        var dia = new Date();
        var salida = "";
        var mes = Number(prompt("Introduzca el mes (numero 0-11)"));
        var ano = Number(prompt("Introduzca el año (4 digitos): "));
        dia.setDate(1);
        dia.setMonth(mes);
        dia.setFullYear(ano);
        
        while (true){
            salida+=(dia.getDate()+"("+dias[dia.getDay()]+")<br>");
            dia.setDate(dia.getDate()+1);
            if (dia.getDate()==1) break;
        }
        document.write(salida);
    </script>
    
</body>
</html>
