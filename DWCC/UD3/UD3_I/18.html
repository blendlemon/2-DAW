<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        var num = "";
        var letra = "";
        
        var letras = [
            "T","R","W","A","G","M","Y","F","P","D","X","B","Z","J","Z","S","Q","V","H","L","C","K","E"
        ];
        var resto = 0;
        while (true){
            num = prompt("Introduce un número entre el 0 y 99999999");
            if (Number(num)==num && num>=0 && num<=99999999){
                num = Number(num);
                resto = num%23;

                letra = letras[resto];

                if (letra!=null){
                    document.write("DNI: "+num+letra+"<br>");
                    console.log("DNI: "+num+letra);
                }
            }
            else{
                break;
            }
        }
        
        
    </script>

</body>
</html>
