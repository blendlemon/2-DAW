<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var texto = prompt("Texto: ");
        for (var i = 0; i < texto.length; i++) {
            if (i<(texto.length-1)){
                document.write(texto.charAt(i)+"-");
            }else{
                document.write(texto.charAt(i));
            }
        }
    </script>
</body>
</html>
