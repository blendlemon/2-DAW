<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var num=0;
        while (true){
            num =  prompt("Introduce un numero no mayor que 50");
            num = Number(num);
            if (num<=50 && num>0){
                break
            }
        }
        for(i=1; i<=num; i++){
            for (j=1; j<=i;j++){
                document.write(j)
            }
            document.write("<br>")
        }
    </script>
</body>
</html>
