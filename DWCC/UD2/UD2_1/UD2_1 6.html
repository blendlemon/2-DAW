<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
      var num = prompt("Introduce un numero");

      if (Number(num) == num){
        document.write("Es un número")
      }else{
        document.write("No es un número")
      }

    </script>
</body>
</html>
