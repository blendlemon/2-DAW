<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var num = prompt("Introduce un numero del 1 al 10:");

        for (i = 1 ; i<=10; i++){
            document.write(i+" x "+num+" ="+i*num+"<br>");
        }

        var i = 1;

        while (i<10){
            document.write(i+" x "+num+" ="+i*num+"<br>");
            i++;
        }

    </script>
</body>
</html>
