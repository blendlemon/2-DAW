<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        
        var filas = 0;
        var columnas = 0;
        var color = true;
        var salida = "";
        var modelo = 0;
        var encabezado = "";
        filas = prompt("Introduce el número de filas");
        columnas = prompt("Introduce el número de columnas");
        modelo = prompt("Seleccione modelo\n1. Pintar las filas impares con un color distinto\n2. Pintar las celdas no consecutivas en forma de tablero de ajedrez\n3. Modelo 1 con encabezado\n4. Modelo 2 con encabezado");
        inicio = filas*columnas;

        switch (modelo){
            case "1":
                salida += ("<table style=\"border: 1px solid black;\"><tbody>");
                for(i=1; i<=filas;i++){
                    if (i%2==0) {
                        salida += ("<tr>");
                    }else{
                        salida += ("<tr style=\"background-color:grey\">");
                    }
                    for(j=1; j<=columnas;j++){
                        salida += ("<td>"+inicio+"</td>");
                        inicio--;
                    }
                    salida += ("</tr>");
                }
                salida += ("</tbody></table>")
                
                break;

            case "2":
                salida += ("<table style=\"border: 1px solid black;\"><tbody>");
                for(i=1; i<=filas;i++){
                    salida += ("<tr>");
                    for(j=1; j<=columnas;j++){
                        if (color==true){
                            salida += ("<td style=\"background-color:grey\">");
                            color= false;
                        }else{
                            salida += ("<td>");
                            color = true;
                        }
                        salida += (inicio+"</td>");
                        inicio--;
                    }
                    salida += ("</tr>");
                    if (columnas%2==0){
                        if (color==true){
                            color = false;
                        }else{
                            color = true
                        }
                    }
                }
                salida += ("</tbody></table>")
                break;
            
            case "3":
                encabezado = prompt("Introduce el enacabezado de la tabla");
                salida += ("<table style=\"border: 1px solid black;\"><tbody>");
                salida += ("<caption>"+encabezado+"</caption>");

                for(i=1; i<=filas;i++){
                        if (i%2==0) {
                            salida += ("<tr>");
                        }else{
                            salida += ("<tr style=\"background-color:grey\">");
                        }
                        for(j=1; j<=columnas;j++){
                            salida += ("<td>"+inicio+"</td>");
                            inicio--;
                        }
                        salida += ("</tr>");
                    }
                    salida += ("</tbody></table>")
                
                break;
            
            case "4":

                encabezado = prompt("Introduce el enacabezado de la tabla");
                salida += ("<table style=\"border: 1px solid black;\"><tbody>");
                salida += ("<caption>"+encabezado+"</caption>");

                for(i=1; i<=filas;i++){
                    salida += ("<tr>");
                    for(j=1; j<=columnas;j++){
                        if (color==true){
                            salida += ("<td style=\"background-color:grey\">");
                            color= false;
                        }else{
                            salida += ("<td>");
                            color = true;
                        }
                        salida += (inicio+"</td>");
                        inicio--;
                    }
                    salida += ("</tr>");
                        if (columnas%2==0){
                        if (color==true){
                            color = false;
                        }else{
                            color = true
                        }
                    }
                }
                salida += ("</tbody></table>");

                break;
                default:
                    alert(Error)
        }
        document.write(salida);
    </script>
</body>
</html>
