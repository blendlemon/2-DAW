<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var filas = 0;
        var columnas = 0;
        var salida = "";

        filas = prompt("Introduce el número de filas");
        columnas = prompt("Introduce el número de columnas");
        inicio = filas*columnas;

        salida += ("<table border=\"1\"><tbody>")
        for(i=1; i<=filas;i++){
            salida+=("<tr>")
            for(j=1; j<=columnas;j++){
                salida+=("<td>"+inicio+"</tdre>");
                inicio--;
            }
            salida+=("</tr>");
        }
        salida+=("</tbody></table>");

        document.write(salida);
    </script>
</body>
</html>
