<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        for(i=1; i<=500; i++){
            document.write(i)
            if(i%4==0){
                document.write("(Múltiplo de 4)");
            }
            if(i%9==0){
                document.write("(Múltiplo de 9)");
            }
            if(i>=5 &&  i%5==0){
                document.write("<br>-----------------");
            }
            document.write("<br>");
        }
    </script>
</body>
</html>
