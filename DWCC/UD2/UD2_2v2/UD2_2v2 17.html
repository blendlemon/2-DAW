<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var horas;
        var tiempo;
        var temp;

        while (true){

            while (true){
                temp = prompt("Introduce el número de horas necesarias para estudiar la materia (3-500)");
                if ((temp>=3 && temp<=500)|| temp==null){
                    horas = Number(temp);
                    break;
                }   
            }
            if (temp == null) break;
            
            while (true){
                temp = prompt("Introduce el número de días disponibles para estudiar la materia(4-300)");
                if ((temp>=4 && temp<=300) || temp==null){
                    tiempo = Number(temp);
                    break;
                }
            }
            if (temp == null) break;

            if (horas != null && tiempo != null){
                if (horas > tiempo*24){
                    document.write("No hay suficiente tiempo para estudiar");
                } else{
                    document.write(horas/tiempo+"<br>");
                }
            }

        }

    </script>
</body>
</html>
