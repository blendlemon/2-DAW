<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var f1 = new Date();
        var esprimo = true;
        for (i=2; i<=100000; i++){
            for (j=2 ; j<i; j++){
                if (i%j==0){
                    esprimo = false;
                    break;
                }
            }
            if (esprimo){
                document.write(i+"<br>");
            }
            esprimo = true;
        }
        var f2 = new Date();
        var diferencia = f2.getTime() - f1.getTime();
        console.log(diferencia);
    </script>
</body>
</html>
