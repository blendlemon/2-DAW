<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var contador = 0;
        for (i=1; i<=1000; i++){
            for (j=1 ; j<=i; j++){
                if (i%j==0){
                    contador++;
                }
            }
            if (contador<=2){
                document.write(i+"<br>");
            }
            contador = 0;
        }
    </script>
</body>
</html>
