<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var a = prompt("Introduzca un número")

        switch (a){
            case "1":
                console.log("Lunes")
                break;
            case "2":
                console.log("Martes")
                break;
            case "3":
                console.log("Miercoles")
                break;
            case "4":
                console.log("Jueves")
                break;
            case "5":
                console.log("Viernes")
                break;
            case "6":
                console.log("Sábado")
                break;
            case "7":
                console.log("Domingo")
                break;
            default:
                console.log("Error")
        }
    </script>
</body>
</html>
