<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var a = prompt("Introduzca un número")

        if (a == "1"){
            console.log("Lunes")
        }
        else if (a == "2"){
            console.log("Martes")
        }
        else if (a == "3"){
            console.log("Miercoles")
        }
        else if (a == "4"){
            console.log("Jueves")
        }
        else if (a == "5"){
            console.log("Viernes")
        }
        else if (a == "6"){
            console.log("Sábado")
        }
        else if (a == "7"){
            console.log("Domingo")
        }
        else{
            console.log("Error")
        }
    </script>
</body>
</html>
